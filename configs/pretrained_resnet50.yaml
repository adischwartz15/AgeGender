# Supplementary experiment config: ImageNet-pretrained torchvision ResNet-50
# (face-only) -- OPTIONAL, larger-capacity pretrained baseline (final-run
# hardening T3). NOT part of the core from-scratch architecture ablation
# suite. Only loaded by
# scripts/run_transfer_learning.py --model-family pretrained_resnet50.
#
# Scientific role: unlike pretrained_resnet18.yaml (the primary pretraining
# bridge baseline), this is explicitly a COMBINED "pretraining +
# architecture + capacity" comparison -- ResNet-50 differs from the
# from-scratch Custom ResNet-18 in initialization AND depth/width/parameter
# count simultaneously. Never described as isolating pretraining alone. See
# src/models/pretrained_resnet.py's module docstring.

model:
  family: pretrained_resnet
  pretrained_resnet:
    model_id: resnet50
    pretrained: true
    # imagenet1k_v2 is torchvision's improved-accuracy ResNet-50 training
    # recipe (recommended over v1 where available); both are in the
    # ImageNet-only allow-list.
    pretrained_source: imagenet1k_v2
  adapters:
    enabled: true
    bottleneck_ratio: 4
    dropout: 0.2
  age_head:
    hidden_dim: 128
    dropout: 0.2
    age_min: 0
    age_max: 120
  gender_head:
    hidden_dim: 128
    dropout: 0.2
    num_classes: 2
    class_names: ["gender_label_0", "gender_label_1"]
    confidence_threshold: 0.80
    class_weights: null
  loss_balancing:
    mode: learned_uncertainty
    learned_uncertainty:
      init_log_var_age: 0.0
      init_log_var_gender: 0.0
      warmup_epochs: 1

training:
  # ResNet-50 has ~4x ResNet-18's parameters at the same 224px resolution --
  # a smaller default batch size than resnet18.yaml, closer to VOLO-D1's,
  # to stay within free-tier Colab/Kaggle GPU memory.
  batch_size: 16
  grad_accumulation_steps: 2   # effective batch size 32
  num_workers: 2
  weight_decay: 0.05
  grad_clip_norm: 1.0
  mixed_precision: true
  seed: 42
  early_stopping_patience: 12
  head_only_epochs: 3
  finetune_epochs: 20
  finetune_unfreeze: full
  head_lr: 3.0e-4
  adapter_lr: 3.0e-4
  loss_balance_lr: 3.0e-4
  backbone_lr: 3.0e-5
  scheduler:
    warmup_epochs: 2
    warmup_start_factor: 0.1

paths:
  checkpoint_dir: ./checkpoints/transfer_learning/pretrained_resnet50_face_only
  output_dir: ./results/transfer_learning/pretrained_resnet50_face_only

transfer_learning:
  experiment_name: pretrained_resnet50_face_only
  baseline_experiment: exp_d_shared_adapters_learned_balance
  seeds: [42, 123, 2026]
  auto_resume: true
  skip_completed: true
  sync_after_epoch: true
  checkpoint_every_epochs: 1
  preserve_previous_checkpoint: true
  verify_checksums: true

persistence:
  backend: auto
  local_root: null
  persistent_root: null
  create_archive: true
  archive_completed_seeds: true

transfer_learning_smoke:
  model:
    pretrained_resnet:
      pretrained: false
  training:
    batch_size: 2
    grad_accumulation_steps: 1
    num_workers: 0
    mixed_precision: false
    head_only_epochs: 1
    finetune_epochs: 1
    early_stopping_patience: 100
    max_train_batches_per_epoch: 2
    max_val_batches_per_epoch: 2
  paths:
    checkpoint_dir: ./checkpoints/transfer_learning/_smoke
    output_dir: ./results/transfer_learning/_smoke
