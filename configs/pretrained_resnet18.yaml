# Supplementary experiment config: ImageNet-pretrained torchvision ResNet-18
# (face-only) -- the REQUIRED pretraining bridge baseline (final-run
# hardening T3). NOT part of the core from-scratch architecture ablation
# suite in configs/experiments.yaml -- merged on top of
# default+data+model+training the same way an experiment override is, but
# lives in its own file and is only loaded by
# scripts/run_transfer_learning.py --model-family pretrained_resnet18.
# Never merged into configs/experiments.yaml, never loaded by
# scripts/run_experiments.py, and never part of the default profile.
#
# Scientific role: the most interpretable bridge between this project's
# from-scratch Custom ResNet-18 (configs/experiments.yaml:
# exp_d_shared_adapters_learned_balance) and a fully pretrained modern
# backbone (VOLO-D1, configs/transfer_learning.yaml) -- same architecture
# family, differing primarily in initialization and input resolution. NOT
# byte-identical to the from-scratch Custom ResNet-18 implementation (see
# src/models/pretrained_resnet.py's module docstring for the exact
# remaining differences). Never described as a controlled ablation.

model:
  # Dispatches src/inference/artifacts.py::load_model_checkpoint to build a
  # PretrainedResNetFaceOnlyMultiTask instead of the default MultiTaskFaceModel.
  family: pretrained_resnet
  pretrained_resnet:
    model_id: resnet18
    pretrained: true
    # Must be present in src/models/pretrained_resnet.py::ALLOWED_PRETRAINED_SOURCES
    # (ImageNet only). imagenet1k_v1 is torchvision's original ResNet-18
    # weight set (the standard, most-cited baseline); imagenet1k_v2 is not
    # available for resnet18 in torchvision as of this writing and falls
    # back to v1 automatically (see PretrainedResNetFaceOnlyMultiTask.__init__).
    pretrained_source: imagenet1k_v1
  adapters:
    enabled: true
    # Same ~4:1 bottleneck ratio as the from-scratch adapters' default and
    # the VOLO extension's own adapters -- bottleneck_dim is NOT hardcoded
    # here, computed as round(discovered_embedding_dim / bottleneck_ratio)
    # (128 for ResNet-18's 512-d embedding).
    bottleneck_ratio: 4
    dropout: 0.2
  age_head:
    hidden_dim: 128
    dropout: 0.2
    age_min: 0
    age_max: 120
  gender_head:
    hidden_dim: 128
    dropout: 0.2
    num_classes: 2
    class_names: ["gender_label_0", "gender_label_1"]
    confidence_threshold: 0.80
    class_weights: null
  loss_balancing:
    # Reuses src/losses/multitask_loss.py unmodified -- same as the
    # from-scratch and VOLO experiments.
    mode: learned_uncertainty
    learned_uncertainty:
      init_log_var_age: 0.0
      init_log_var_gender: 0.0
      warmup_epochs: 1

training:
  # ResNet-18 @ 224px is heavier than the from-scratch 128px models but
  # lighter than VOLO-D1 -- a larger default batch size than VOLO's is
  # usually safe, but kept conservative for free-tier Colab/Kaggle GPUs.
  batch_size: 32
  grad_accumulation_steps: 1
  num_workers: 2
  weight_decay: 0.05
  grad_clip_norm: 1.0
  mixed_precision: true        # AMP, CUDA-only -- auto-disabled on CPU (see TransferTrainer)
  seed: 42
  early_stopping_patience: 12
  head_only_epochs: 3          # Stage 1: frozen backbone, adapters/heads/balancing only
  finetune_epochs: 20          # Stage 2 ceiling; early stopping (validation only) still applies
  finetune_unfreeze: full      # "full" or {last_n_stages: N}
  head_lr: 3.0e-4
  adapter_lr: 3.0e-4
  loss_balance_lr: 3.0e-4
  backbone_lr: 3.0e-5
  scheduler:
    # Real warmup (see configs/training.yaml and src/training/optim.py):
    # LR rises from warmup_start_factor * base_lr to base_lr over
    # warmup_epochs, never starting at the full base LR.
    warmup_epochs: 2
    warmup_start_factor: 0.1

paths:
  checkpoint_dir: ./checkpoints/transfer_learning/pretrained_resnet18_face_only
  output_dir: ./results/transfer_learning/pretrained_resnet18_face_only

# transfer_learning_extension run profile: seeds match the core suite's
# pre-registered protocol (docs/final_evaluation_protocol.md) exactly.
transfer_learning:
  experiment_name: pretrained_resnet18_face_only
  baseline_experiment: exp_d_shared_adapters_learned_balance
  seeds: [42, 123, 2026]
  auto_resume: true
  skip_completed: true
  sync_after_epoch: true
  checkpoint_every_epochs: 1
  preserve_previous_checkpoint: true
  verify_checksums: true

persistence:
  backend: auto
  local_root: null
  persistent_root: null
  create_archive: true
  archive_completed_seeds: true

# transfer_learning_smoke: tiny, non-scientific config for a fast CPU
# integration check -- pretrained=false (no network access), a couple of
# synthetic-sized batches, one short epoch per stage. Any metrics produced
# under this profile must be labelled non-scientific, never reported in Table B.
transfer_learning_smoke:
  model:
    pretrained_resnet:
      pretrained: false
  training:
    batch_size: 2
    grad_accumulation_steps: 1
    num_workers: 0
    mixed_precision: false
    head_only_epochs: 1
    finetune_epochs: 1
    early_stopping_patience: 100
    max_train_batches_per_epoch: 2
    max_val_batches_per_epoch: 2
  paths:
    checkpoint_dir: ./checkpoints/transfer_learning/_smoke
    output_dir: ./results/transfer_learning/_smoke
