# FastAPI backend configuration.

api:
  host: 0.0.0.0
  port: 8000
  cors_origins: ["http://localhost:5173", "http://127.0.0.1:5173"]
  model_version: "v1"
  active_checkpoint: ./checkpoints/multitask_best_balanced.pt
  knn_index_dir: ./outputs/knn
  calibration_dir: ./outputs/calibration
  persist_uploaded_images: false
  max_upload_size_mb: 10
  request_timeout_seconds: 30
  enable_gradcam: true
  enable_knn_comparison: true
