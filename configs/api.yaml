# FastAPI backend configuration.

api:
  host: 0.0.0.0
  port: 8000
  cors_origins: ["http://localhost:5173", "http://127.0.0.1:5173"]
  model_version: "v1"
  active_checkpoint: ./checkpoints/multitask_best_balanced_score.pt
  # Optional display-name override for the two dataset gender-label
  # classes, independent of whatever was baked into the checkpoint's
  # training-time config -- e.g. ["male", "female"] if your dataset's own
  # documentation defines its binary label that way (UTKFace does: gender
  # 0=male, 1=female). Never changes which learned class index is which,
  # only the label shown for it. GENDER_LABEL_0 / GENDER_LABEL_1
  # environment variables (see .env.example) take priority over this when set.
  gender_label_overrides: null   # e.g. ["male", "female"]
  knn_index_dir: ./outputs/knn
  calibration_dir: ./outputs/calibration
  persist_uploaded_images: false
  max_upload_size_mb: 10
  request_timeout_seconds: 30
  enable_gradcam: true
  enable_knn_comparison: true
  # Crop to the largest detected face (classical Haar cascade, not a
  # neural network -- src/inference/face_detection.py) before running the
  # model, since the model is trained on tightly face-cropped images
  # (e.g. UTKFace) and an arbitrary uploaded photo otherwise includes a
  # lot of background/clothing/context the model never saw in training.
  # When no face is found, age/gender/Grad-CAM predictions are declined
  # entirely (age=None, gender=None, gradcam=None) rather than run on a
  # non-face image, since the model is only meaningful on face crops
  # similar to its training data -- see src/inference/predictor.py.
  enable_face_detection: true
  face_margin_ratio: 0.35
